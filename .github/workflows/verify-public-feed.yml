name: Verify deployed public feed

on:
  workflow_run:
    workflows: ["Collect and publish NYC feed"]
    types: [completed]

permissions:
  contents: read

jobs:
  verify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch the deployed feed, allowing for Pages propagation
        run: curl --fail --silent --show-error --retry 8 --retry-all-errors --retry-delay 15 https://kip-claw.github.io/trmnl-jazz-lineup/nyc.json | node scripts/validate-feed.mjs -
